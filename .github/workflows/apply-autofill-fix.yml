name: Apply Scientific Name Autofill Fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-autofill-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch GBIF input controls
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('gbif_fieldmap_builder_app.py')
          text = p.read_text(encoding='utf-8')
          old = '    st.sidebar.markdown("Scientific name")\n    name = st.sidebar.text_input("Scientific name", value="", placeholder="e.g. Campanula punctata", key="gbif_scientific_name_no_autofill", label_visibility="collapsed")\n    country = st.sidebar.text_input("Country code optional", value="JP", max_chars=2, key="gbif_country_code_filter")\n'
          new = '    name = st.sidebar.text_input("Taxon scientific name", value="", placeholder="e.g. Campanula punctata", key="gbif_taxon_scientific_name_input")\n    country_options = ["", "JP", "US", "GB", "CN", "KR", "TW", "DE", "FR", "IT", "ES", "AU", "NZ", "CA", "BR", "IN", "ID", "TH", "VN"]\n    selected_country = st.sidebar.selectbox("Country code filter optional", country_options, index=1, key="gbif_country_code_filter_select")\n    custom_country = st.sidebar.text_input("Custom country code optional", value="", max_chars=2, key="gbif_country_code_filter_custom", help="Two-letter ISO country code. Overrides the dropdown when set.")\n    country = custom_country.strip().upper() or selected_country\n'
          if old not in text:
              raise SystemExit('target block not found')
          p.write_text(text.replace(old, new), encoding='utf-8')
          Path('.github/workflows/apply-autofill-fix.yml').unlink(missing_ok=True)
          PY
      - name: Validate
        run: python -m py_compile gbif_fieldmap_builder_app.py
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gbif_fieldmap_builder_app.py .github/workflows/apply-autofill-fix.yml
          git commit -m "Fix scientific name autofill mixup" || exit 0
          git push
