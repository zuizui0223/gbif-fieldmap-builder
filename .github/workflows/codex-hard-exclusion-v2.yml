name: Codex hard exclusion v2

on:
  push:
    paths:
      - .github/workflows/codex-hard-exclusion-v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Patch Streamlit app
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          path = Path('gbif_fieldmap_builder_app.py')
          s = path.read_text(encoding='utf-8')

          if 'APP_BUILD_ID = ' in s:
              s = re.sub(r'APP_BUILD_ID = "[^"]+"', 'APP_BUILD_ID = "hard-exclusion-v2-20260529"', s, count=1)
          else:
              s = s.replace('APP_TITLE = "GBIF FieldMap Builder"\n', 'APP_TITLE = "GBIF FieldMap Builder"\nAPP_BUILD_ID = "hard-exclusion-v2-20260529"\n', 1)
          if 'st.sidebar.caption(f"Build: {APP_BUILD_ID}")' not in s:
              s = s.replace('    st.sidebar.header("Data source")\n', '    st.sidebar.caption(f"Build: {APP_BUILD_ID}")\n    st.sidebar.header("Data source")\n', 1)

          s = s.replace(
              'def make_sdm_extent_preview_map(occ_raw: pd.DataFrame, occ: pd.DataFrame, excluded_ids: set[int], extent_geom, area_mode: str) -> folium.Map:',
              'def make_sdm_extent_preview_map(occ: pd.DataFrame, extent_geom, area_mode: str) -> folium.Map:',
          )
          s = s.replace('    center_df = occ if not occ.empty else occ_raw\n', '    center_df = occ\n')
          s = re.sub(
              r'    fg_ex = FeatureGroup\(name="red excluded points", show=True\)\n    excluded = occ_raw\[occ_raw\["_row_id"\]\.astype\(int\)\.isin\(excluded_ids\)\]\n    for _, row in excluded\.iterrows\(\):\n        rid = int\(row\["_row_id"\]\)\n        folium\.CircleMarker\(\n            \(row\["_latitude"\], row\["_longitude"\]\),\n            radius=8,\n            color="#d62728",\n            fill=True,\n            fill_color="#d62728",\n            fill_opacity=0\.88,\n            weight=2,\n            tooltip=f"excluded from SDM \| row \{rid\}",\n        \)\.add_to\(fg_ex\)\n',
              '',
              s,
              count=1,
          )
          s = s.replace('    fg_ex.add_to(fmap)\n', '')
          s = s.replace('make_sdm_extent_preview_map(occ_raw, occ, active_excluded_ids, extent_geom, area_mode)', 'make_sdm_extent_preview_map(occ, extent_geom, area_mode)')

          s = s.replace('Choose the prediction area before building SDM. The extent is calculated from included blue points only; red excluded points are ignored.', 'Choose the prediction area before building SDM. Only blue included points are used below; excluded rows are removed from the analysis view and hard-masked from prediction.')
          s = s.replace('Red-point cutout radius (km)', 'Hard exclusion radius (km)')
          s = s.replace('value=1.0, step=0.5, key="sdm_exclusion_cutout_km", help="Red excluded records are physically cut out of the prediction extent by this radius."', 'value=10.0, step=1.0, key="sdm_exclusion_cutout_km", help="Excluded records are removed from training and their surrounding area is physically cut out of the prediction extent."')
          s = s.replace('blue included records after thinning; {len(active_excluded_ids):,} red excluded records.', 'blue included records after thinning; {len(active_excluded_ids):,} excluded records removed and hard-masked.')

          forbidden = ['red excluded points', 'Red-point cutout radius', 'make_sdm_extent_preview_map(occ_raw']
          present = [x for x in forbidden if x in s]
          if present:
              raise SystemExit(f'Forbidden old markers still present: {present}')
          required = ['APP_BUILD_ID = "hard-exclusion-v2-20260529"', 'Hard exclusion radius (km)', 'hard-masked from prediction', 'make_sdm_extent_preview_map(occ, extent_geom, area_mode)', 'geom.difference(cutouts)']
          missing = [x for x in required if x not in s]
          if missing:
              raise SystemExit(f'Missing required markers: {missing}')
          path.write_text(s, encoding='utf-8')
          PY
          python -m py_compile gbif_fieldmap_builder_app.py
      - name: Commit patch and remove workflow
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add gbif_fieldmap_builder_app.py
          git commit -m "Make excluded points fully absent from SDM extent view"
          git rm .github/workflows/codex-hard-exclusion-v2.yml
          git commit -m "Remove one-time hard exclusion v2 workflow"
          git push
