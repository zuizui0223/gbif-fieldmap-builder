name: Package checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e .
      - name: Compile Python sources
        run: python -m py_compile gbif_fieldmap_builder_app.py acsp/__init__.py acsp/app.py acsp/benchmarking.py acsp/cli.py acsp/planning.py acsp/modeling.py acsp/sdm.py acsp_discover.py
      - name: Run Python tests
        run: python -m unittest discover -v
      - name: Build Python wheel
        run: python -m build --wheel
      - name: Verify wheel in an isolated environment
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install --upgrade pip
          .wheel-venv/bin/python -m pip install dist/*.whl
          pushd /tmp
          "$GITHUB_WORKSPACE/.wheel-venv/bin/python" -I -c "import acsp; import acsp.cli; import acsp_discover; import gbif_fieldmap_builder_app; print('installed Python package and app imports successfully')"
          popd
      - name: Verify packaged app and recommendation commands
        run: |
          acsp-fieldmap --help
          acsp-recommend --help

  github-action:
    name: ACSP GitHub Action smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the local ACSP Action
        id: acsp
        uses: ./
        with:
          candidates-csv: examples/acsp-candidates.csv
          output-csv: action-smoke/recommended.csv
          summary-json: action-smoke/summary.json
          per-area: "3"
      - name: Confirm Action outputs
        shell: bash
        run: |
          set -euo pipefail
          test -s "${{ steps.acsp.outputs.recommended-csv }}"
          test -s "${{ steps.acsp.outputs.summary-json }}"
          test "${{ steps.acsp.outputs.selected-count }}" = "4"
          python - <<'PY'
          import pandas as pd
          zones = pd.read_csv("action-smoke/recommended.csv")
          required = {"zone_id", "zone_score", "zone_rank", "zone_member_count", "representative_site_id"}
          assert required.issubset(zones.columns), required - set(zones.columns)
          PY

  r:
    name: R package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r-acsp
          extra-packages: any::rcmdcheck
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r-acsp
